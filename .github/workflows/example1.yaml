name: .NET CIWorkflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  build:
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' 
    - name: Install workloads
      run: dotnet workload restore
    - name: Debug files
      run: ls -R
    - name: Restore dependencies
      run: dotnet restore --property:EnableiOSWorkload=false
    - name: Build
      run: dotnet build eShop.Web.slnf --configuration Release /p:EnableiOSWorkload=false /p:EnableMacCatalystWorkload=false 
    - name: Test
      run: dotnet test --no-build --verbosity normal

    
