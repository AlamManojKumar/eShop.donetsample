name: .NET CIWorkflow
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  build:
    runs-on: windows-latest 
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: false
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' 
    - name: Install MAUI workload
      run: dotnet workload install maui 
    - name: Restore dependencies
      run: dotnet restore eShop.slnx 
    - name: Build
      run: dotnet build eShop.slnx --configuration Release      
    - name: Test
      run: |
        dotnet test --project tests/Basket.UnitTests/Basket.UnitTests.csproj --configuration Release --no-build --verbosity normal
        dotnet test --project tests/Ordering.UnitTests/Ordering.UnitTests.csproj --configuration Release --no-build --verbosity normal
        
        
  

    
